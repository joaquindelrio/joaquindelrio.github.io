<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Config Editor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #11141a;
    --surface2: #181c24;
    --border: #252a35;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --accent3: #a3ff57;
    --text: #e8eaf0;
    --muted: #5a6070;
    --success: #a3ff57;
    --danger: #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .brand { display: flex; flex-direction: column; gap: 4px; }

  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-val.modified { color: var(--accent3); }
  .stat-val.selected { color: var(--accent2); }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="text"], input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border-radius: 8px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .search-wrap input { padding-left: 36px; }

  input:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .btn.primary:hover { background: #00c4dd; border-color: #00c4dd; color: #000; }

  .btn.danger { border-color: var(--accent2); color: var(--accent2); }
  .btn.danger:hover { background: rgba(255,77,109,0.1); }

  .btn.success { border-color: var(--accent3); color: var(--accent3); }
  .btn.success:hover { background: rgba(163,255,87,0.1); }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Bulk edit bar */
  .bulk-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .bulk-bar.visible { display: flex; }

  .bulk-bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .field-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
  }

  .field-pill label {
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
  }

  .field-pill input[type="number"] {
    width: 60px;
    padding: 4px 8px;
    font-size: 12px;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: var(--accent3); }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }

  thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: var(--accent); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sorted { color: var(--accent); }
  thead th.sorted .sort-icon { opacity: 1; }

  th.check-col, td.check-col {
    width: 36px;
    padding: 8px 10px;
    text-align: center;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr.selected { background: rgba(0,229,255,0.05); }
  tbody tr.modified { background: rgba(163,255,87,0.04); }
  tbody tr.modified.selected { background: rgba(163,255,87,0.07); }

  td { padding: 7px 14px; vertical-align: middle; }

  td.imei-cell {
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
  }

  .cell-input {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 80px;
    padding: 5px 8px;
    border-radius: 5px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }

  .cell-input:hover { border-color: var(--border); background: var(--surface2); }
  .cell-input:focus { border-color: var(--accent); background: var(--surface2); }
  .cell-input.changed { border-color: rgba(163,255,87,0.4); color: var(--accent3); }

  .flag-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .flag-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    font-family: 'Syne', sans-serif;
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .flag-badge.on { background: rgba(163,255,87,0.12); color: var(--accent3); border-color: rgba(163,255,87,0.3); }
  .flag-badge.off { background: rgba(255,77,109,0.1); color: var(--accent2); border-color: rgba(255,77,109,0.25); }
  .flag-badge:hover { filter: brightness(1.2); }

  .mod-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    display: inline-block;
    margin-right: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  tr.modified .mod-dot { opacity: 1; }

  /* Checkbox */
  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .page-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .page-controls { display: flex; gap: 8px; align-items: center; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast-msg {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(8px);
    animation: toastIn 0.2s forwards, toastOut 0.3s 2.5s forwards;
    pointer-events: auto;
  }

  .toast-msg.ok { border-color: rgba(163,255,87,0.4); color: var(--accent3); }
  .toast-msg.err { border-color: rgba(255,77,109,0.4); color: var(--accent2); }

  @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(-6px); } }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(0,229,255,0.04); }

  .upload-zone h2 { font-size: 20px; font-weight: 700; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone svg { color: var(--accent); }

  #file-input { display: none; }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .stats-bar { gap: 12px; }
    .stat-val { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <span class="brand-tag">// device config editor</span>
      <h1>Config <span>Manager</span></h1>
    </div>
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-val modified" id="stat-modified">0</span>
        <span class="stat-label">Modified</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-val selected" id="stat-selected">0</span>
        <span class="stat-label">Selected</span>
      </div>
    </div>
  </header>

  <!-- Upload zone -->
  <div class="upload-zone" id="upload-zone">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <h2>Drop your CSV here</h2>
    <p>or click to browse — supports the device_config format</p>
    <button class="btn primary" onclick="document.getElementById('file-input').click()">Choose file</button>
    <input type="file" id="file-input" accept=".csv">
  </div>

  <!-- Editor (hidden until file loaded) -->
  <div id="editor" style="display:none">

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="Search IMEI...">
      </div>

      <button class="btn" onclick="selectAll()" id="btn-select-all">Select all</button>
      <button class="btn" onclick="deselectAll()">Deselect</button>
      <button class="btn danger" onclick="undoAll()" id="btn-undo" disabled>↩ Undo all</button>
      <button class="btn success" onclick="exportCSV()" id="btn-export">⬇ Export CSV</button>
    </div>

    <!-- Bulk edit bar -->
    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-bar-label" id="bulk-label">— selected</span>

      <div class="field-pill">
        <label>enable_telit</label>
        <span class="flag-badge on" id="bulk-telit-badge" onclick="bulkToggleTelit()">ON</span>
      </div>

      <div class="field-pill">
        <label>t1</label>
        <input type="number" id="bulk-t1" placeholder="—" onchange="bulkSetField('t1', this.value)">
      </div>
      <div class="field-pill">
        <label>t2</label>
        <input type="number" id="bulk-t2" placeholder="—" onchange="bulkSetField('t2', this.value)">
      </div>
      <div class="field-pill">
        <label>v1</label>
        <input type="number" id="bulk-v1" placeholder="—" onchange="bulkSetField('v1', this.value)">
      </div>
      <div class="field-pill">
        <label>v2</label>
        <input type="number" id="bulk-v2" placeholder="—" onchange="bulkSetField('v2', this.value)">
      </div>
      <div class="field-pill">
        <label>v3</label>
        <input type="number" id="bulk-v3" placeholder="—" onchange="bulkSetField('v3', this.value)">
      </div>
      <div class="field-pill">
        <label>v4</label>
        <input type="number" id="bulk-v4" placeholder="—" onchange="bulkSetField('v4', this.value)">
      </div>

      <button class="btn danger" style="margin-left:auto" onclick="deselectAll()">Clear selection</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="main-table">
          <thead>
            <tr>
              <th class="check-col"><input type="checkbox" id="check-all" onchange="toggleCheckAll(this)"></th>
              <th></th>
              <th class="sortable" data-col="imei" onclick="sortBy('imei')">IMEI <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="t1" onclick="sortBy('t1')">t1 <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="t2" onclick="sortBy('t2')">t2 <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="enable_telit" onclick="sortBy('enable_telit')">enable_telit <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="v1" onclick="sortBy('v1')">v1 <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="v2" onclick="sortBy('v2')">v2 <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="v3" onclick="sortBy('v3')">v3 <span class="sort-icon">↕</span></th>
              <th class="sortable" data-col="v4" onclick="sortBy('v4')">v4 <span class="sort-icon">↕</span></th>
              <th>char1</th><th>char2</th><th>char3</th><th>char4</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="bottom-bar">
        <span class="page-info" id="page-info"></span>
        <div class="page-controls">
          <button class="btn" id="btn-prev" onclick="changePage(-1)">← Prev</button>
          <span class="page-info" id="page-num"></span>
          <button class="btn" id="btn-next" onclick="changePage(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let originalData = [];
let data = [];
let filteredIndices = [];
let selected = new Set();
let sortCol = null, sortDir = 1;
let page = 0;
const PAGE_SIZE = 20;
let headers = [];
let bulkTelitValue = 0; // what bulk toggle will set

// ── CSV Parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const hdrs = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const vals = line.split(',');
    const row = {};
    hdrs.forEach((h, i) => {
      const v = (vals[i] || '').trim();
      row[h] = v === '' ? '' : isNaN(v) ? v : Number(v);
    });
    return row;
  });
  return { headers: hdrs, rows };
}

function toCSV(hdrs, rows) {
  const lines = [hdrs.join(',')];
  rows.forEach(r => lines.push(hdrs.map(h => r[h] === null || r[h] === undefined || r[h] !== r[h] ? '' : r[h]).join(',')));
  return lines.join('\n');
}

// ── File Load ──────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadFile(f);
});

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
zone.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') document.getElementById('file-input').click();
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const { headers: hdrs, rows } = parseCSV(e.target.result);
    headers = hdrs;
    originalData = rows.map(r => ({ ...r }));
    data = rows.map((r, i) => ({ ...r, _id: i, _modified: false }));
    selected.clear();
    page = 0;
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('editor').style.display = 'block';
    document.getElementById('stats-bar').style.display = 'flex';
    applyFilter();
    toast(`Loaded ${data.length} devices`, 'ok');
  };
  reader.readAsText(file);
}

// ── Filtering & Sorting ────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filteredIndices = data
    .map((r, i) => i)
    .filter(i => !q || String(data[i].imei).toLowerCase().includes(q));

  if (sortCol) {
    filteredIndices.sort((a, b) => {
      const va = data[a][sortCol], vb = data[b][sortCol];
      return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
    });
  }
  page = 0;
  renderTable();
  updateStats();
}

document.getElementById('search').addEventListener('input', applyFilter);

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === col);
    if (th.dataset.col === col) {
      th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↑' : '↓';
    } else if (th.querySelector('.sort-icon')) {
      th.querySelector('.sort-icon').textContent = '↕';
    }
  });
  applyFilter();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('table-body');
  const start = page * PAGE_SIZE;
  const slice = filteredIndices.slice(start, start + PAGE_SIZE);

  if (slice.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="no-results">No devices found</td></tr>';
  } else {
    tbody.innerHTML = slice.map(i => rowHTML(i)).join('');
  }

  const total = filteredIndices.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  document.getElementById('page-info').textContent = `Showing ${Math.min(start+1,total)}–${Math.min(start+PAGE_SIZE,total)} of ${total}`;
  document.getElementById('page-num').textContent = `${page+1} / ${pages}`;
  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = page >= pages - 1;

  // Sync check-all
  const visibleSelected = slice.filter(i => selected.has(i)).length;
  document.getElementById('check-all').checked = slice.length > 0 && visibleSelected === slice.length;
  document.getElementById('check-all').indeterminate = visibleSelected > 0 && visibleSelected < slice.length;
}

function rowHTML(i) {
  const r = data[i];
  const sel = selected.has(i);
  const mod = r._modified;
  const telit = Number(r.enable_telit);

  const numCell = (field) =>
    `<td><input class="cell-input${originalData[i][field] !== r[field] ? ' changed' : ''}" type="number" value="${r[field] ?? ''}" onchange="cellChange(${i},'${field}',this.value)" oninput="this.classList.toggle('changed',this.value!==${JSON.stringify(originalData[i][field])})"></td>`;

  const charCell = (field) => {
    const v = r[field];
    const orig = originalData[i][field];
    const val = (v === '' || v === null || v === undefined || (typeof v === 'number' && isNaN(v))) ? '' : v;
    return `<td><input class="cell-input${orig !== r[field] ? ' changed' : ''}" type="number" value="${val}" onchange="cellChange(${i},'${field}',this.value)"></td>`;
  };

  return `<tr class="${sel?'selected':''} ${mod?'modified':''}" id="row-${i}">
    <td class="check-col"><input type="checkbox" ${sel?'checked':''} onchange="toggleSelect(${i},this.checked)"></td>
    <td><span class="mod-dot" title="Modified"></span></td>
    <td class="imei-cell">${r.imei}</td>
    ${numCell('t1')}
    ${numCell('t2')}
    <td><span class="flag-badge ${telit?'on':'off'}" onclick="toggleTelit(${i})">${telit?'ON':'OFF'}</span></td>
    ${numCell('v1')}
    ${numCell('v2')}
    ${numCell('v3')}
    ${numCell('v4')}
    ${charCell('char1')}${charCell('char2')}${charCell('char3')}${charCell('char4')}
  </tr>`;
}

// ── Cell Editing ───────────────────────────────────────────────────────────
function cellChange(i, field, val) {
  const parsed = val === '' ? '' : Number(val);
  data[i][field] = parsed;
  markModified(i);
}

function toggleTelit(i) {
  data[i].enable_telit = data[i].enable_telit ? 0 : 1;
  markModified(i);
  rerenderRow(i);
}

function markModified(i) {
  const orig = originalData[i];
  const cur = data[i];
  const changed = headers.some(h => {
    const ov = orig[h], cv = cur[h];
    if ((ov === '' || ov === null || ov === undefined || (typeof ov === 'number' && isNaN(ov))) &&
        (cv === '' || cv === null || cv === undefined || (typeof cv === 'number' && isNaN(cv)))) return false;
    return ov !== cv;
  });
  data[i]._modified = changed;
  updateStats();
  // update row classes without full re-render
  const row = document.getElementById(`row-${i}`);
  if (row) {
    row.classList.toggle('modified', changed);
  }
}

function rerenderRow(i) {
  const row = document.getElementById(`row-${i}`);
  if (row) row.outerHTML = rowHTML(i);
}

// ── Selection ──────────────────────────────────────────────────────────────
function toggleSelect(i, checked) {
  if (checked) selected.add(i); else selected.delete(i);
  const row = document.getElementById(`row-${i}`);
  if (row) row.classList.toggle('selected', checked);
  updateStats();
  updateBulkBar();
}

function toggleCheckAll(checkbox) {
  const start = page * PAGE_SIZE;
  const slice = filteredIndices.slice(start, start + PAGE_SIZE);
  slice.forEach(i => { if (checkbox.checked) selected.add(i); else selected.delete(i); });
  renderTable();
  updateStats();
  updateBulkBar();
}

function selectAll() {
  filteredIndices.forEach(i => selected.add(i));
  renderTable();
  updateStats();
  updateBulkBar();
}

function deselectAll() {
  selected.clear();
  renderTable();
  updateStats();
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const n = selected.size;
  bar.classList.toggle('visible', n > 0);
  document.getElementById('bulk-label').textContent = `${n} device${n!==1?'s':''} selected`;
}

// ── Bulk Edit ──────────────────────────────────────────────────────────────
let bulkTelitState = 0;

function bulkToggleTelit() {
  bulkTelitState = bulkTelitState ? 0 : 1;
  const badge = document.getElementById('bulk-telit-badge');
  badge.textContent = bulkTelitState ? 'ON' : 'OFF';
  badge.className = 'flag-badge ' + (bulkTelitState ? 'on' : 'off');
  selected.forEach(i => { data[i].enable_telit = bulkTelitState; markModified(i); });
  renderTable();
  toast(`enable_telit → ${bulkTelitState} on ${selected.size} devices`, 'ok');
}

function bulkSetField(field, val) {
  if (val === '') return;
  const parsed = Number(val);
  selected.forEach(i => { data[i][field] = parsed; markModified(i); });
  renderTable();
  toast(`${field} → ${parsed} on ${selected.size} devices`, 'ok');
}

// ── Undo ───────────────────────────────────────────────────────────────────
function undoAll() {
  data = originalData.map((r, i) => ({ ...r, _id: i, _modified: false }));
  selected.clear();
  page = 0;
  applyFilter();
  toast('All changes reverted', 'ok');
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-modified').textContent = data.filter(r => r._modified).length;
  document.getElementById('stat-selected').textContent = selected.size;
  document.getElementById('btn-undo').disabled = !data.some(r => r._modified);
}

// ── Pagination ─────────────────────────────────────────────────────────────
function changePage(d) {
  const pages = Math.ceil(filteredIndices.length / PAGE_SIZE);
  page = Math.max(0, Math.min(pages - 1, page + d));
  renderTable();
}

// ── Export ─────────────────────────────────────────────────────────────────
function exportCSV() {
  const clean = data.map(r => {
    const row = {};
    headers.forEach(h => { row[h] = r[h]; });
    return row;
  });
  const csv = toCSV(headers, clean);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'device_config_updated.csv';
  a.click();
  URL.revokeObjectURL(url);
  const modified = data.filter(r => r._modified).length;
  toast(`Exported ${data.length} rows (${modified} modified)`, 'ok');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
