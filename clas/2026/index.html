<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clasificacions en directe</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2a;
      --panel-2: #10233a;
      --line: #223a57;
      --text: #eaf2ff;
      --muted: #9eb1c8;
      --accent: #4fd1ff;
      --warn-bg: #3a2a09;
      --warn-line: #7c5a12;
      --warn-text: #ffe6a8;
      --danger-bg: #3a1017;
      --danger-line: #7b2330;
      --danger-text: #ffd7de;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body { overflow: hidden; }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      height: 100vh;
      padding: 16px;
    }

    .panel, .viewer {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .panel-header, .viewer-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    #logo {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  max-height: 80px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.6;
}


    .panel-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: calc(100% - 92px);
    }

    .row { display: flex; gap: 8px; }

    input[type="text"], input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      background: #07111f;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    button.primary {
      background: var(--accent);
      color: #052030;
      border-color: transparent;
    }

    button:hover { filter: brightness(1.06); }

    .hint, .error {
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    .hint {
      background: var(--warn-bg);
      border: 1px solid var(--warn-line);
      color: var(--warn-text);
    }

    .error {
      background: var(--danger-bg);
      border: 1px solid var(--danger-line);
      color: var(--danger-text);
      display: none;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meta-grid label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .section-title {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #0a1726;
      color: var(--muted);
    }

    .files {
      overflow: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      border: 1px solid var(--line);
      background: #091423;
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      text-align: left;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .file-check {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .file-item.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(79,209,255,.15);
      background: rgba(79,209,255,.08);
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .viewer-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 120px;
      flex-wrap: wrap;
    }

    .viewer-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .viewer-subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .viewer-body {
      height: calc(100% - 102px);
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 800px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #08111d;
      z-index: 2;
      text-align: left;
      font-size: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      vertical-align: top;
    }

    tbody tr:nth-child(odd) td {
      background: rgba(255,255,255,.015);
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 18px;
      text-align: center;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fullscreen .panel { display: none; }
    .fullscreen .app { grid-template-columns: 1fr; }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 100vh;
      }
      .panel { min-height: 45vh; }
      .viewer { min-height: 55vh; }
      .viewer-body { height: 70vh; }
    }
  </style>
</head>
<body>
  <img id="logo" src="logo.jpg" style="display:none;">
  <div class="app" id="app">
    <aside class="panel">
      <div class="panel-header">
        <h1 class="title">Clasificacions</h1>
        <p class="subtitle">...........</p>
      </div>

      <div class="panel-body">
        <div>
          <div class="section-title" style="margin-bottom:8px;">URL del listado</div>
          <div class="row">
            <input id="urlInput" type="text" value="https://quim.obsea.es/clas/2026/Talaia2026New/" />
            <button id="loadBtn" class="primary">Cargar</button>
          </div>
        </div>

        <div class="meta-grid">
          <div>
            <label>Recarga cada (segundos)</label>
            <input id="reloadSeconds" type="number" min="5" value="20" />
          </div>
          <div>
            <label>Pausa final (segundos)</label>
            <input id="bottomPauseSeconds" type="number" min="1" step="0.5" value="1.8" />
          </div>
        </div>

        <div class="toolbar">
          <button id="toggleRunBtn">Pausar rotación</button>
          <button id="refreshBtn">Recargar ahora</button>
          <button id="fullscreenBtn">Pantalla completa</button>
        </div>

        <div class="hint">
          ................
        </div>

        <div id="errorBox" class="error"></div>

        <div class="section-title">
          <span>Archivos detectados</span>
          <span id="fileCount" class="badge">0 archivos</span>
        </div>

        <div class="toolbar">
          <button id="checkAllBtn">Check all</button>
          <button id="uncheckAllBtn">Uncheck all</button>
        </div>

        <div id="filesList" class="files"></div>
      </div>
    </aside>

    <main class="viewer">
      <div class="viewer-header">
        <div class="viewer-header-top">
          <div>
            <h2 id="viewerTitle" class="viewer-title">Sin archivo seleccionado</h2>
            <p id="viewerSubtitle" class="viewer-subtitle">Carga una URL para empezar</p>
          </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-start;">
            <span id="statusBadge" class="badge">Esperando</span>
            <span id="updatedBadge" class="badge">Sin actualizar</span>
          </div>
        </div>
      </div>

      <div id="viewerBody" class="viewer-body">
        <div class="empty">............</div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      sourceUrl: 'https://quim.obsea.es/clas/2026/Talaia2026New/',
      enabledUrls: new Set(),
      files: [],
      activeIndex: 0,
      tableData: { sheetName: '', rows: [] },
      isRunning: true,
      scrollTimer: null,
      cycleTimer: null,
      reloadTimer: null,
      lastUpdated: null,
      loadingList: false,
      loadingTable: false,
    };

    const els = {
      app: document.getElementById('app'),
      urlInput: document.getElementById('urlInput'),
      loadBtn: document.getElementById('loadBtn'),
      reloadSeconds: document.getElementById('reloadSeconds'),
      bottomPauseSeconds: document.getElementById('bottomPauseSeconds'),
      toggleRunBtn: document.getElementById('toggleRunBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      fullscreenBtn: document.getElementById('fullscreenBtn'),
      checkAllBtn: document.getElementById('checkAllBtn'),
      uncheckAllBtn: document.getElementById('uncheckAllBtn'),
      filesList: document.getElementById('filesList'),
      fileCount: document.getElementById('fileCount'),
      viewerTitle: document.getElementById('viewerTitle'),
      viewerSubtitle: document.getElementById('viewerSubtitle'),
      viewerBody: document.getElementById('viewerBody'),
      errorBox: document.getElementById('errorBox'),
      statusBadge: document.getElementById('statusBadge'),
      updatedBadge: document.getElementById('updatedBadge'),
    };

    function normalizeBaseUrl(url) {
      const trimmed = (url || '').trim();
      if (!trimmed) return '';
      return trimmed.endsWith('/') ? trimmed : trimmed + '/';
    }

    function absoluteUrl(baseUrl, href) {
      try {
        return new URL(href, baseUrl).toString();
      } catch {
        return href;
      }
    }

    function fileNameFromHref(href) {
      const raw = String(href || '');
      const noQuery = raw.split('?')[0].split('#')[0];
      const parts = noQuery.split('/').filter(Boolean);
      const last = parts[parts.length - 1] || noQuery || 'archivo';
      return decodeURIComponent(last).replace(/\.(xlsx?|csv)$/i, '').trim();
    }

    function showError(message) {
      if (!message) {
        els.errorBox.style.display = 'none';
        els.errorBox.textContent = '';
        return;
      }
      els.errorBox.style.display = 'block';
      els.errorBox.textContent = message;
    }

    function setStatus() {
      const parts = [];
      if (state.loadingList) parts.push('Cargando listado');
      if (state.loadingTable) parts.push('Cargando tabla');
      if (!state.loadingList && !state.loadingTable) {
        parts.push(state.isRunning ? 'Auto-scroll activo' : 'Pausado');
      }

      els.statusBadge.textContent = parts.join(' · ');
      els.updatedBadge.textContent = state.lastUpdated
        ? 'Actualizado ' + state.lastUpdated.toLocaleTimeString()
        : 'Sin actualizar';
      els.toggleRunBtn.textContent = state.isRunning ? 'Pausar rotación' : 'Reanudar rotación';
    }

    function parseListing(html, baseUrl) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const anchors = Array.from(doc.querySelectorAll('a'));
      const out = [];
      const seen = new Set();

      for (let i = 0; i < anchors.length; i++) {
        const a = anchors[i];
        const href = a.getAttribute('href') || '';
        const text = (a.textContent || '').trim();

        const isSpreadsheet = /\.(xlsx?|csv)$/i.test(href) || /xlsx|xls|csv/i.test(text);
        if (!href || !isSpreadsheet) continue;

        const url = absoluteUrl(baseUrl, href);
        if (seen.has(url)) continue;
        seen.add(url);

        const cleanedName = fileNameFromHref(href);
        const extension = (href.split('.').pop() || 'xlsx').toLowerCase();

        out.push({
          id: String(i) + '-' + url,
          name: cleanedName || text || href,
          url,
          extension,
        });
      }

      return out;
    }

    function getEnabledFiles() {
      return state.files.filter(file => state.enabledUrls.has(file.url));
    }

    function getNextEnabledIndex(fromIndex) {
      if (!state.files.length || !state.enabledUrls.size) return -1;

      for (let offset = 1; offset <= state.files.length; offset++) {
        const idx = (fromIndex + offset) % state.files.length;
        if (state.enabledUrls.has(state.files[idx].url)) return idx;
      }

      return -1;
    }

    function ensureEnabledSelection() {
      if (!state.files.length || !state.enabledUrls.size) return;

      if (!state.files[state.activeIndex] || !state.enabledUrls.has(state.files[state.activeIndex].url)) {
        const firstEnabled = state.files.findIndex(file => state.enabledUrls.has(file.url));
        if (firstEnabled >= 0) state.activeIndex = firstEnabled;
      }
    }

    function renderFiles() {
      const selectedCount = state.files.filter(file => state.enabledUrls.has(file.url)).length;
      els.fileCount.textContent = selectedCount + ' / ' + state.files.length + ' activos';
      els.filesList.innerHTML = '';

      state.files.forEach((file, index) => {
        const btn = document.createElement('button');
        btn.className = 'file-item' + (index === state.activeIndex ? ' active' : '');
        btn.type = 'button';
        btn.innerHTML = '<input class="file-check" type="checkbox"><span class="file-name"></span><span class="badge">' + file.extension + '</span>';

        const checkbox = btn.querySelector('.file-check');
        checkbox.checked = state.enabledUrls.has(file.url);

        checkbox.onclick = async (event) => {
          event.stopPropagation();

          if (checkbox.checked) {
            state.enabledUrls.add(file.url);
          } else {
            state.enabledUrls.delete(file.url);
          }

          renderFiles();

          if (!state.enabledUrls.size) {
            state.tableData = { sheetName: '', rows: [] };
            renderTable();
            clearScrollTimers();
            return;
          }

          if (index === state.activeIndex && !state.enabledUrls.has(file.url)) {
            const nextIndex = getNextEnabledIndex(index);
            if (nextIndex >= 0) {
              state.activeIndex = nextIndex;
              renderFiles();
              await loadActiveFile();
            }
          }
        };

        btn.querySelector('.file-name').textContent = file.name || fileNameFromHref(file.url) || 'archivo';

        btn.onclick = async () => {
          if (!state.enabledUrls.has(file.url)) return;
          state.activeIndex = index;
          renderFiles();
          await loadActiveFile();
        };

        els.filesList.appendChild(btn);
      });
    }

    function renderTable() {
      const activeFile = state.files[state.activeIndex];
      els.viewerTitle.textContent = activeFile ? (activeFile.name || fileNameFromHref(activeFile.url) || 'archivo') : 'Sin archivo seleccionado';
      els.viewerSubtitle.textContent = state.tableData.sheetName
        ? 'Hoja: ' + state.tableData.sheetName
        : 'Sin datos cargados';

      const rows = state.tableData.rows || [];
      if (!rows.length) {
        els.viewerBody.innerHTML = '<div class="empty">' + (state.enabledUrls.size ? 'No hay datos para mostrar.' : 'No hay archivos seleccionados para mostrar.') + '</div>';
        setStatus();
        return;
      }

      const headers = rows[0] || [];
      const body = rows.slice(1);
      const table = document.createElement('table');

      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      headers.forEach((header, index) => {
        const th = document.createElement('th');
        th.textContent = header || ('Col ' + (index + 1));
        trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      body.forEach((row) => {
        const tr = document.createElement('tr');
        row.forEach((cell) => {
          const td = document.createElement('td');
          td.textContent = cell == null ? '' : String(cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);

      els.viewerBody.innerHTML = '';
      els.viewerBody.appendChild(table);


      setStatus();
      restartAutoScroll();
    }

    function sheetToRows(workbook) {
      const firstSheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[firstSheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: '',
        raw: false,
        blankrows: false,
      }).filter(row => Array.isArray(row) && row.some(cell => String(cell ?? '').trim() !== ''));

      const maxCols = rows.reduce((max, row) => Math.max(max, row.length), 0);
      const normalized = rows.map(row => Array.from({ length: maxCols }, (_, i) => row[i] ?? ''));
      return { sheetName: firstSheetName, rows: normalized };
    }

    async function fetchListing(preserveCurrent) {
      const baseUrl = normalizeBaseUrl(state.sourceUrl);
      state.loadingList = true;
      showError('');
      setStatus();

      try {
        const res = await fetch(baseUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('No se pudo leer el listado (' + res.status + ')');

        const html = await res.text();
        const files = parseListing(html, baseUrl);
        if (!files.length) {
          throw new Error('No se han encontrado archivos Excel o CSV en esa URL.');
        }

        const currentUrl = preserveCurrent && state.files[state.activeIndex]
          ? state.files[state.activeIndex].url
          : null;

        const previousEnabled = new Set(state.enabledUrls);

        state.files = files;
        state.activeIndex = 0;

        const nextEnabled = new Set();
        files.forEach((file) => {
          if (!preserveCurrent || previousEnabled.size === 0 || previousEnabled.has(file.url)) {
            nextEnabled.add(file.url);
          }
        });
        state.enabledUrls = nextEnabled;

        if (currentUrl) {
          const found = files.findIndex(f => f.url === currentUrl);
          if (found >= 0) state.activeIndex = found;
        }

        ensureEnabledSelection();
        state.lastUpdated = new Date();
        renderFiles();
      } catch (err) {
        state.files = [];
        state.tableData = { sheetName: '', rows: [] };
        renderFiles();
        renderTable();
        showError(err.message || 'No se pudo cargar el listado.');
      } finally {
        state.loadingList = false;
        setStatus();
      }
    }

    async function loadActiveFile() {
      ensureEnabledSelection();
      const file = state.files[state.activeIndex];

      if (!file || !state.enabledUrls.has(file.url)) {
        state.tableData = { sheetName: '', rows: [] };
        renderTable();
        return;
      }

      state.loadingTable = true;
      showError('');
      setStatus();

      try {
        const res = await fetch(file.url, { cache: 'no-store' });
        if (!res.ok) throw new Error('No se pudo leer ' + file.name + ' (' + res.status + ')');

        const ext = file.extension.toLowerCase();
        if (ext === 'csv') {
          const text = await res.text();
          const workbook = XLSX.read(text, { type: 'string' });
          state.tableData = sheetToRows(workbook);
        } else {
          const buffer = await res.arrayBuffer();
          const workbook = XLSX.read(buffer, { type: 'array' });
          state.tableData = sheetToRows(workbook);
        }

        state.lastUpdated = new Date();
        renderTable();
      } catch (err) {
        state.tableData = { sheetName: '', rows: [] };
        renderTable();
        showError(err.message || 'No se pudo cargar la tabla.');
      } finally {
        state.loadingTable = false;
        setStatus();
      }
    }

    function clearScrollTimers() {
      if (state.scrollTimer) clearInterval(state.scrollTimer);
      if (state.cycleTimer) clearTimeout(state.cycleTimer);
      state.scrollTimer = null;
      state.cycleTimer = null;
    }

    function restartAutoScroll() {
      clearScrollTimers();
      if (!state.isRunning) return;

      const container = els.viewerBody;
      if (!container) return;

      container.scrollTop = 0;

      state.cycleTimer = setTimeout(() => {
        state.scrollTimer = setInterval(async () => {
          const maxScroll = container.scrollHeight - container.clientHeight;

          if (maxScroll <= 0) {
            clearScrollTimers();
            state.cycleTimer = setTimeout(nextFile, getBottomPauseMs());
            return;
          }

          const next = container.scrollTop + 1;
          if (next >= maxScroll) {
            container.scrollTop = maxScroll;
            clearScrollTimers();
            state.cycleTimer = setTimeout(nextFile, getBottomPauseMs());
            return;
          }

          container.scrollTop = next;
        }, 30);
      }, 800);
    }

    async function nextFile() {
      if (!state.files.length || !state.enabledUrls.size) return;

      const nextIndex = getNextEnabledIndex(state.activeIndex);
      if (nextIndex < 0) return;

      state.activeIndex = nextIndex;
      renderFiles();
      await loadActiveFile();
    }

    function getReloadMs() {
      const seconds = Math.max(5, Number(els.reloadSeconds.value) || 20);
      return seconds * 1000;
    }

    function getBottomPauseMs() {
      const seconds = Math.max(1, Number(els.bottomPauseSeconds.value) || 1.8);
      return seconds * 1000;
    }

    function restartReloadTimer() {
      if (state.reloadTimer) clearInterval(state.reloadTimer);

      state.reloadTimer = setInterval(async () => {
        const currentUrl = state.files[state.activeIndex]
          ? state.files[state.activeIndex].url
          : null;

        await fetchListing(true);

        if (state.files.length) {
          if (currentUrl) {
            const found = state.files.findIndex(f => f.url === currentUrl);
            if (found >= 0) state.activeIndex = found;
          }
          renderFiles();
          await loadActiveFile();
        }
      }, getReloadMs());
    }

    async function loadAll(resetIndex) {
      if (resetIndex) state.activeIndex = 0;
      state.sourceUrl = normalizeBaseUrl(els.urlInput.value);

      await fetchListing(!resetIndex);
      ensureEnabledSelection();

      if (getEnabledFiles().length) {
        await loadActiveFile();
      } else {
        state.tableData = { sheetName: '', rows: [] };
        renderTable();
      }

      restartReloadTimer();
    }

    els.loadBtn.onclick = async () => { await loadAll(true); };

    els.refreshBtn.onclick = async () => {
      await fetchListing(true);
      if (state.files.length) await loadActiveFile();
      restartReloadTimer();
    };

    els.checkAllBtn.onclick = async () => {
      state.enabledUrls = new Set(state.files.map(file => file.url));
      ensureEnabledSelection();
      renderFiles();
      if (state.files.length) await loadActiveFile();
    };

    els.uncheckAllBtn.onclick = () => {
      state.enabledUrls = new Set();
      state.tableData = { sheetName: '', rows: [] };
      renderFiles();
      renderTable();
      clearScrollTimers();
    };

    els.toggleRunBtn.onclick = () => {
      state.isRunning = !state.isRunning;
      setStatus();
      restartAutoScroll();
    };

    els.fullscreenBtn.onclick = async () => {
      document.body.classList.toggle('fullscreen');
      if (!document.fullscreenElement) {
        try { await document.documentElement.requestFullscreen(); } catch {}
      } else {
        try { await document.exitFullscreen(); } catch {}
      }
    };

    els.reloadSeconds.onchange = restartReloadTimer;
    els.bottomPauseSeconds.onchange = restartAutoScroll;

    window.addEventListener('beforeunload', () => {
      clearScrollTimers();
      if (state.reloadTimer) clearInterval(state.reloadTimer);
    });

    (function loadLogo() {
      const img = document.getElementById('logo');

      img.onload = () => {
        img.style.display = 'block';
      };

      img.onerror = () => {
        img.style.display = 'none';
      };
    })();

    setStatus();
    loadAll(true);
  </script>
</body>
</html>
